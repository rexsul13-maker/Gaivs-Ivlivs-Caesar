<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corpus Caesarianum: Archivo Imperial Completo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght=700&family=Lora&display=swap');

        :root {
            --sangue: #4a0404;
            --oro: #b8860b;
            --oro-brillante: #ffd700;
            --pergamino: #fdfaf5;
            --texto: #1a1a1a;
            --marmol: #ffffff;
        }

        body {
            background-color: #0d0d0d;
            margin: 0;
            padding: 0;
            font-family: 'Lora', 'Georgia', serif;
            color: var(--texto);
        }

        .pagina {
            display: none;
            max-width: 1260px;
            margin: 30px auto;
            background: var(--marmol);
            box-shadow: 0 0 120px rgba(0,0,0,0.8);
            border: 2px solid var(--oro);
            border-bottom: 5px double var(--sangue);
            min-height: 85vh;
        }

        #pagina-inicio {
            display: block;
        }

        header {
            padding: 60px 40px 40px 40px;
            text-align: center;
            background: var(--marmol);
        }

        .logo-imperial {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0px 4px 8px rgba(184, 134, 11, 0.3));
        }

        header h1 {
            font-size: 6rem;
            margin: 0;
            color: var(--sangue);
            letter-spacing: 30px;
            text-transform: uppercase;
            font-weight: 900;
            font-family: 'Cinzel', serif;
        }

        header p {
            letter-spacing: 10px;
            color: var(--oro);
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 25px;
            margin-bottom: 0;
        }

        /* Caja del reproductor único */
        .seccion-audio-nueva {
            background: #fdfaf5;
            max-width: 500px;
            margin: 0 auto 40px auto;
            padding: 25px;
            border: 2px dashed var(--oro);
            border-radius: 8px;
            text-align: center;
        }

        .reproductor-bloque {
            margin-bottom: 0px;
        }

        .reproductor-bloque label {
            display: block;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: var(--sangue);
            margin-bottom: 12px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .reproductor-bloque audio {
            width: 100%;
        }

        .menu-navegacion {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: var(--sangue);
            gap: 2px;
            border-bottom: 4px solid var(--oro);
        }

        .btn-tomo {
            background: var(--sangue);
            color: var(--oro);
            border: 3px solid var(--oro);
            padding: 30px 10px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.4s;
            margin: 2px;
        }

        .btn-tomo:hover {
            background: var(--oro);
            color: var(--sangue);
        }

        .btn-galeria {
            grid-column: span 3;
            background: linear-gradient(to right, #000, var(--sangue), #000);
            font-size: 1.6rem;
            letter-spacing: 15px;
        }

        .btn-general {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            color: var(--oro);
            border: 3px solid var(--oro);
            border-radius: 6px;
            padding: 14px 35px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        #gran-lector {
            background: var(--pergamino);
            padding: 100px 160px;
            line-height: 2.8;
            font-size: 1.5rem;
            text-align: justify;
        }

        .titulo-capitulo {
            font-size: 4rem;
            color: var(--sangue);
            border-bottom: 3px solid var(--oro);
            margin-bottom: 60px;
            font-family: 'Cinzel', serif;
        }

        .dropcap {
            float: left;
            font-size: 10rem;
            line-height: 0.7;
            padding-top: 25px;
            padding-right: 30px;
            color: var(--sangue);
            font-family: 'Cinzel', serif;
        }

        .grid-visual {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .frame-imagen {
            background: #fff;
            padding: 20px;
            border: 3px solid var(--oro);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }

        .frame-imagen img {
            width: 100%;
            height: auto;
            border: 1px solid #eee;
        }

        .frame-imagen p {
            margin-top: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
        }

        .frame-imagen b {
            display: block;
            color: var(--sangue);
            font-size: 1.3rem;
            margin-bottom: 10px;
            font-family: 'Cinzel', serif;
        }

        footer {
            background: #000;
            color: var(--oro);
            text-align: center;
            padding: 80px 40px;
            letter-spacing: 8px;
            font-size: 1rem;
        }

        @media (max-width: 1100px) {
            #gran-lector { padding: 60px 40px; }
            header h1 { font-size: 3rem; letter-spacing: 10px; }
            .menu-navegacion { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="pagina-inicio" class="pagina">
    <header>
        <img id="img-logo" src="https://drive.google.com/thumbnail?sz=w1000&id=1aWB60R__W7gm1vvx-slDOrpTZltOMZL1" 
             alt="Logo Imperial" class="logo-imperial" onerror="activarPlanB(this)">
        <h1>CAESAR</h1>
        <p>VENI • VIDI • VICI</p>
    </header>

    <div class="seccion-audio-nueva">
        <div class="reproductor-bloque">
            <label>🗣️ Escuchar Mensaje Imperial</label>
            <audio controls src="https://raw.githubusercontent.com/rexsul13-maker/Roma/main/Roma.mp3"></audio>
        </div>
    </div>

    <nav class="menu-navegacion">
        <button class="btn-tomo" onclick="abrirTomo(1)">I. Linaje Divino</button>
        <button class="btn-tomo" onclick="abrirTomo(2)">II. El Mar Egeo</button>
        <button class="btn-tomo" onclick="abrirTomo(3)">III. El Triunvirato</button>
        <button class="btn-tomo" onclick="abrirTomo(4)">IV. Las Galias</button>
        <button class="btn-tomo" onclick="abrirTomo(5)">V. El Rubicón</button>
        <button class="btn-tomo" onclick="abrirTomo(6)">VI. Farsalia</button>
        <button class="btn-tomo" onclick="abrirTomo(7)">VII. Egipto</button>
        <button class="btn-tomo" onclick="abrirTomo(8)">VIII. Reformas</button>
        <button class="btn-tomo" onclick="abrirTomo(9)">IX. Los Idus</button>
        <button class="btn-tomo btn-galeria" onclick="abrirGaleria()">ARCHIVO VISUAL DEL IMPERIO</button>
    </nav>
    
    <footer>SPQR • ROMA EST AETERNA</footer>
</div>

<div id="pagina-lectura" class="pagina">
    <div style="padding: 40px 0px 0px 40px;">
        <button class="btn-general" onclick="volverAlInicio()">← Regresar al Menú Principal</button>
    </div>
    
    <article id="gran-lector">
        <h2 id="titulo-capitulo" class="titulo-capitulo"></h2>
        <div id="cuerpo-contenido"></div>
    </article>
    
    <footer>
        <p style="font-family: 'Lora', serif; font-size: 0.8rem; letter-spacing: 1px; color: #666; margin-bottom: 15px; text-transform: none;">
            Aviso legal: Esta página web ha sido desarrollada con fines puramente educativos e ilustrativos para un proyecto escolar. Todo el contenido multimedia pertenece a sus respectivos autores.
        </p>
        SPQR • ROMA EST AETERNA
    </footer>
</div>

<script>
function activarPlanB(elementoImagen) {
    elementoImagen.src = "https://drive.google.com/uc?export=view&id=1aWB60R__W7gm1vvx-slDOrpTZltOMZL1";
    elementoImagen.onerror = function() {
        this.src = "https://images.weserv.nl/?url=drive.google.com/uc?id=1aWB60R__W7gm1vvx-slDOrpTZltOMZL1";
        this.onerror = null;
    };
}

const textosImperiales = {
    1: {
        titulo: "I. El Linaje de Venus y la Resistencia",
        letra: "L",
        texto: "a historia de Cayo Julio César comienza no en un palacio, sino en la Subura, el barrio más denso y peligroso de Roma, en el año 100 a.C. Su familia, la Gens Iulia, era patricia pero carecía de la fortuna necesaria para dominar la política. Sin embargo, poseían algo más poderoso: un mito. Reclamaban descender de Iulo, hijo de Eneas, y por ende de la mismísima diosa Venus. Esta convicción de predestinación divina marcó el carácter de César desde su infancia.<br><br>Su juventud fue forjada por la guerra civil entre su tío Mario y el dictador Sila. Al negarse a repudiar a su esposa Cornelia para ganar el favor de Sila, César cometió su primer acto de audacia absoluta. Fue perseguido, se ocultó en los montes y estuvo a punto de ser ejecutado. Solo la intercesión de las Vírgenes Vestales logró que Sila le perdonara, aunque este último advirtió con tono profético: 'Cuidado, pues en este joven veo a muchos Marios'. César aprendió entonces que en Roma, el honor sin poder es una sentencia de muerte."
    },
    2: {
        titulo: "II. El Honor en el Egeo: Piratas y Retórica",
        letra: "E",
        texto: "n el 75 a.C., piratas cilicios capturaron a César mientras viajaba a Rodas para estudiar oratoria. Lejos de amedrentarse, exigió que subieran su rescate de 20 a 50 talentos, alegando que un hombre de su rango valía mucho más. Durante su cautiverio, les dictaba poemas y discursos, y si no se mostraban impresionados, los llamaba bárbaros. Les prometió volver y crucificarlos; los piratas reían ante su arrogancia. Semanas después de ser liberado, armó una flota personal, los cazó y cumplió su palabra. El honor para César era una deuda que siempre se pagaba con sangre."
    },
    3: {
        titulo: "III. El Pacto de los Titanes: El Triunvirato",
        letra: "E",
        texto: "l Primer Triunvirato (60 a.C.) fue la alianza secreta más poderosa de la antigüedad. César unió la fuerza militar de Pompeyo el Grande y la inmensa fortuna de Craso a su propio genio político. Durante su consulado, aplastó la oposición senatorial a través del apoyo popular y la intimidación física. Fue el año en que Roma dejó de ser gobernada por leyes para serlo por hombres. César obtuvo las provincias de las Galias, dándole la base para construir el ejército que finalmente lo llevaría a la cumbre del poder absoluto."
    },
    4: {
        titulo: "IV. Bellvm Gallicvm: Alesia y el Genio Militar",
        letra: "L",
        texto: "a conquista de las Galias (58-50 a.C.) no fue solo una campaña de expansión, sino la construcción de una leyenda personal. El punto culminante fue el asedio de Alesia en el 52 a.C. Vercingétorix había logrado unir a casi toda la Galia contra Roma.<br><br>César demostró ser el maestro supremo de la poliorcética. Construyó una línea de fortificación hacia adentro (circunvalación) para rendir a los sitiados, y otra hacia afuera (contravallación) para protegerse de los 250,000 galos que venían al rescate. Luchando en dos frentes simultáneos y apareciendo siempre donde la muralla flaqueaba, César logró lo imposible. Alesia marcó el fin de la Galia libre y el nacimiento de un general cuyas legiones ya no le juraban lealtad al State, sino a él personalmente."
    },
    5: {
        titulo: "V. El Paso del Rubicón: Alea Iacta Est",
        letra: "E",
        texto: "l 10 de enero del 49 a.C., César llegó al límite de su provincia. Cruzar el Rubicón con tropas era un acto de traición que lo condenaba a la muerte o a la gloria absoluta. 'Alea Iacta Est' (La suerte está echada). Su avance por Italia fue una demostración de velocidad táctica (*celeritas*) que dejó paralizado al Senado. No perseguía la destrucción, sino la legitimidad; por ello aplicó su famosa *Clementia*, perdonando a quienes deponían las armas, convirtiendo la República en una cáscara vacía ante la voluntad de un líder decidido."
    },
    6: {
        titulo: "VI. Farsalia: El Duelo de los Gigantes",
        letra: "E",
        texto: "n el año 48 a.C., el destino de Roma se decidió en Tesalia. Pompeyo el Grande contaba con la superioridad numérica y el apoyo del Senado. Pero César contaba con la Legio X y veteranos curtidos en el infierno galo.<br><br>La genialidad táctica de César se manifestó al crear una cuarta línea de infantería oculta. Cuando la masiva caballería aristocrática de Pompeyo cargó, estos hombres surgieron con sus *pila* apuntando a los rostros de los nobles. El pánico se apoderó del ejército republicano. César, al ver la carnicería, pronunció con tristeza: 'Hoc voluerunt' (Ellos lo quisieron). Pompeyo huyó hacia Egipto, marcando el fin de la República oligárquica y el ascenso indiscutible del Dictador."
    },
    7: {
        titulo: "VII. El Sueño del Nilo y Cleopatra",
        letra: "E",
        texto: "n Egipto, César no solo encontró a Cleopatra, sino el modelo de la monarquía absoluta. Juntos recorrieron el Nilo en el *Thalamegos*, una nave palacio de proporciones colosales. Cleopatra le mostró cómo un gobernante podía ser visto como un dios vivo, lejos de las restricciones del Senado romano. César regresó a Roma con la visión de un imperio unificado, llevando consigo el germen de lo que más tarde sería el sistema imperial de su heredero Augusto, transformando la administración romana para siempre."
    },
    8: {
        titulo: "VIII. El Estado Juliano y la Revolución Económica",
        letra: "C",
        texto: "como Dictador Perpetuo, César rediseñó la realidad. Fue el primer gobernante romano en colocar su propia efigie en vida en un denario de plata. Esta era una herramienta de propaganda masiva: cada vez que un legionario recibía su paga, veía el rostro de César como el garante de la estabilidad. Sus reformas incluyeron el Calendario Juliano y la creación del Forum Iulium. Al construir un nuevo Foro y una nueva Curia, César desplazó el centro de poder desde el viejo Senado hacia sus propios monumentos dinásticos, creando un Estado centralizado y eficiente."
    },
    9: {
        titulo: "IX. Los Idus de Marzo: El Ocaso del Semidiós",
        letra: "E",
        texto: "l 15 de marzo del 44 a.C., la libertad de los aristócratas se vistió de traición. En el Teatro de Pompeyo, 60 conspiradores asesinaron a César con 23 puñaladas. Pensaron que matando al hombre salvaban la República, pero solo lograron deificarlo. El nombre 'César' pasó de ser un apellido familiar a convertirse en el título supremo de todos los emperadores venideros. Su muerte no restauró el viejo orden; simplemente encendió la mecha que terminaría de convertir a Roma en el mayor imperio que el mundo haya conocido jamás."
    }
};

function abrirTomo(id) {
    document.getElementById('pagina-inicio').style.display = 'none';
    document.getElementById('pagina-lectura').style.display = 'block';
    const tomo = textosImperiales[id];
    document.getElementById('titulo-capitulo').innerText = tomo.titulo;
    document.getElementById('cuerpo-contenido').innerHTML = `
        <span class="dropcap">${tomo.letra}</span>
        <p style="margin: 0; text-align: justify;">${tomo.texto}</p>
    `;
    window.scrollTo(0, 0);
}

function abrirGaleria() {
    document.getElementById('pagina-inicio').style.display = 'none';
    document.getElementById('pagina-lectura').style.display = 'block';
    document.getElementById('titulo-capitulo').innerText = "Monumenta Caesar";
    document.getElementById('cuerpo-contenido').innerHTML = `
        <div class="grid-visual">
            <div class="frame-imagen">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/C%C3%A9sar_%2813667960455%29.jpg/960px-C%C3%A9sar_%2813667960455%29.jpg" alt="Busto de César (Arlés)">
                <p><b>Bvsto de Arlés</b>Retrato de realismo arqueológico impecable. Muestra las facciones maduras del Dictador marcadas por las fatigas de las campañas militares de las Galias.</p>
            </div>
            <div class="frame-imagen">
                <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/11/27/45/ed/curia-julia.jpg?w=1200&h=-1&s=1" alt="Curia Iulia">
                <p><b>Cvria Ivlia</b>Sede monumental del Senado Romano en el Foro. Fue reconstruida bajo el mandato de César para centralizar el poder estatal en su propia dinastía.</p>
            </div>
            <div class="frame-imagen">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/S0484.4.jpg/330px-S0484.4.jpg" alt="Denario de Julio César">
                <p><b>Denarivs Imperial</b>Moneda de plata con la efigie de César portando la leyenda CAESAR DICT, utilizada como herramienta masiva de propaganda y legitimación económica.</p>
            </div>
            <div class="frame-imagen">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Lionel_Royer_-_Vercingetorix_Throwing_down_His_Weapons_at_the_feet_of_Julius_Caesar.jpg" alt="Rendición de Vercingétorix">
                <p><b>Alesia: Vercingétorix</b>Célebre pintura histórica de Lionel Royer que inmortaliza el momento en que el líder galo arroja sus armas ante los pies de un imperturbable Julio César.</p>
            </div>
            <div class="frame-imagen">
                <img src="https://www.cienciahistorica.com/wp-content/uploads/2016/01/sitio-de-alesia-1280x720.png" alt="El Sitio de Alesia">
                <p><b>Obsidio Alesia (72 a.C.)</b>Ilustración detallada de los formidables sistemas de fortificación romana (circunvalación y contravallación) ideados por César para sitiar la plaza gala.</p>
            </div>
        </div>
    `;
    window.scrollTo(0, 0);
}

function volverAlInicio() {
    document.getElementById('pagina-lectura').style.display = 'none';
    document.getElementById('pagina-inicio').style.display = 'block';
    window.scrollTo(0, 0);
}
</script>

</body>
</html>
